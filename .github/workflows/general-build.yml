name: General Build

on:
  workflow_call:
    inputs:
        version:
            required: true
            type: string

permissions:
  contents: write

jobs:
  build-general:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Get version from tag
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}" -replace "^v", ""
          echo "VERSION=$version" >> $env:GITHUB_ENV


      - name: Update version files
        shell: pwsh
        run: |
          $version = $env:VERSION
          $readme = Get-Content README.md -Raw

          Set-Content App/version.txt $version
          $readme = $readme -replace 'Native-v\d+\.\d+\.\d+-orange', "Native-v$version-orange"

          Set-Content README.md $readme
        
          
      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-metadata
          path: App/version.txt

      - name: Commit and push version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add App/version.txt README.md

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit"
            exit 0
          }

          git commit -m "Bump version to $env:VERSION"
          git push origin HEAD:main