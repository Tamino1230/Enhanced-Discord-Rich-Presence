name: Linux Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

env:
  VERSION: ''

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Get version from tag
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          CLEAN_VERSION="${INPUT_VERSION#v}"
          echo "VERSION=$CLEAN_VERSION" >> $GITHUB_ENV


      - name: Download version artifact
        uses: actions/download-artifact@v4
        with:
          name: version-metadata
          path: App/


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: App
        run: |
          python -m PyInstaller --clean bridge.spec


      - name: Assemble Installer Script
        run: |
          CHROME_JSON=$(cat App/app_manifest.chrome.json)
          FIREFOX_JSON=$(cat App/app_manifest.firefox.json)
          export CHROME_JSON FIREFOX_JSON
          
          python3 -c "
          import os
          with open('install-template.sh', 'r') as f: text = f.read()
          text = text.replace('__CHROME_MANIFEST_TEMPLATE__', os.environ['CHROME_JSON'])
          text = text.replace('__FIREFOX_MANIFEST_TEMPLATE__', os.environ['FIREFOX_JSON'])
          with open('temp-installer.sh', 'w') as f: f.write(text)
          "

          python3 -c "
          from pathlib import Path
          p = Path('temp-installer.sh')
          text = p.read_text()
          text = text.rstrip('\n') + '\n'
          p.write_text(text)
          "
          
          mkdir -p Releases
          cat temp-installer.sh App/dist/com.enhanced.rpc.bridge > Releases/EnhancedRPC-${{ env.VERSION }}-linux_x86_64-setup.sh
          chmod +x Releases/EnhancedRPC-${{ env.VERSION }}-linux_x86_64-setup.sh
          
          rm temp-installer.sh


      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: Releases/*.sh